name: Windows Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-${{ github.event_name }}-${{ github.ref || github.run_id }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  RUST_TOOLCHAIN: "1.88.0"
  SING_BOX_VERSION: "1.13.5"

jobs:
  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, target: x86_64-pc-windows-msvc }
          - { arch: arm64, target: aarch64-pc-windows-msvc }
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1.9.0
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Build Windows bundle
        shell: powershell
        run: .\windows\build-windows.ps1 -Architecture ${{ matrix.arch }} -SingBoxVersion ${{ env.SING_BOX_VERSION }}

      - name: Package archive
        shell: powershell
        run: |
          $archive = "s-ui-windows-${{ matrix.arch }}.zip"
          if (Test-Path $archive) {
            Remove-Item $archive -Force
          }
          Compress-Archive -Path "windows/dist/${{ matrix.arch }}/*" -DestinationPath $archive

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: s-ui-windows-${{ matrix.arch }}
          path: ./s-ui-windows-${{ matrix.arch }}.zip
          retention-days: 30
          if-no-files-found: error

      - name: Upload to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.event.release.tag_name }}
          file: s-ui-windows-${{ matrix.arch }}.zip
          asset_name: s-ui-windows-${{ matrix.arch }}.zip
          prerelease: false
          overwrite: true
