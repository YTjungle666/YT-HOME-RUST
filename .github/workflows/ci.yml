name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "24"
      RUST_TOOLCHAIN: "1.88.0"
      SING_BOX_VERSION: "1.13.5"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1.15.4
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl

      - name: Install cargo-audit and cargo-deny
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Frontend quality gate
        working-directory: frontend
        run: |
          npm ci
          npm run lint -- --max-warnings=0
          npm run typecheck
          npm run build
          npm audit --audit-level=high

      - name: Rust quality gate
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          cargo test --workspace --all-features
          cargo build --release -p app
          cargo build --offline --release --target x86_64-unknown-linux-musl -p app
          cargo audit
          cargo deny check

      - name: Runtime smoke test
        run: |
          sh ./scripts/fetch-sing-box.sh linux amd64 "$RUNNER_TEMP/sing-box" "$SING_BOX_VERSION"
          SUI_SING_BOX_BIN="$RUNNER_TEMP/sing-box/sing-box" \
          SUI_WEB_DIR="$GITHUB_WORKSPACE/frontend/dist" \
          SUI_DB_FOLDER="$RUNNER_TEMP/sui-db" \
          SUI_WEB_PORT=18080 \
          SUI_SUB_PORT=18080 \
          ./target/release/app >"$RUNNER_TEMP/sui.log" 2>&1 &
          APP_PID=$!
          trap 'kill $APP_PID' EXIT
          for _ in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:18080/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:18080/health
          curl -fsS -c "$RUNNER_TEMP/cookies.txt" -X POST -d 'user=admin&pass=admin' http://127.0.0.1:18080/api/login
          curl -fsS -b "$RUNNER_TEMP/cookies.txt" 'http://127.0.0.1:18080/api/status?r=sbd'
          curl -fsS -b "$RUNNER_TEMP/cookies.txt" 'http://127.0.0.1:18080/api/checkOutbound?tag=direct'

      - name: Docker build smoke test
        run: |
          docker build --build-arg SING_BOX_VERSION="${SING_BOX_VERSION}" -t yt-home-rust-ci .
          docker rm -f yt-home-rust-ci-test >/dev/null 2>&1 || true
          docker run -d --name yt-home-rust-ci-test -p 18081:80 yt-home-rust-ci
          trap 'docker rm -f yt-home-rust-ci-test >/dev/null 2>&1 || true' EXIT
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18081/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:18081/health
          curl -fsS -X POST -d 'user=admin&pass=admin' http://127.0.0.1:18081/api/login
