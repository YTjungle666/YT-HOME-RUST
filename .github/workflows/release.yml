name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  SING_BOX_VERSION: "1.13.5"

jobs:
  ensure-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          prerelease: false

  build-linux:
    needs: ensure-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, docker_platform: linux/amd64 }
          - { arch: arm64, docker_platform: linux/arm64 }
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Export runtime filesystem
        run: |
          rm -rf "$RUNNER_TEMP/export"
          docker buildx build \
            --platform "${{ matrix.docker_platform }}" \
            --build-arg SING_BOX_VERSION="${{ env.SING_BOX_VERSION }}" \
            --output "type=local,dest=$RUNNER_TEMP/export" \
            -f Dockerfile \
            .

      - name: Assemble release bundle
        run: |
          rm -rf s-ui
          mkdir -p s-ui
          cp "$RUNNER_TEMP/export/app/sui" s-ui/
          cp "$RUNNER_TEMP/export/app/sing-box" s-ui/
          if [ -f "$RUNNER_TEMP/export/app/libcronet.so" ]; then
            cp "$RUNNER_TEMP/export/app/libcronet.so" s-ui/
          fi
          cp -R "$RUNNER_TEMP/export/app/web" s-ui/
          cp -R "$RUNNER_TEMP/export/app/migrations" s-ui/
          cp s-ui.service s-ui/
          cp s-ui.sh s-ui/
          cp install.sh s-ui/
          chmod +x s-ui/sui s-ui/sing-box s-ui/s-ui.sh s-ui/install.sh
          tar -zcf "s-ui-linux-${{ matrix.arch }}.tar.gz" s-ui

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: s-ui-linux-${{ matrix.arch }}
          path: ./s-ui-linux-${{ matrix.arch }}.tar.gz
          retention-days: 30
          if-no-files-found: error

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          file: s-ui-linux-${{ matrix.arch }}.tar.gz
          asset_name: s-ui-linux-${{ matrix.arch }}.tar.gz
          prerelease: false
          overwrite: true
