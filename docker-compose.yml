---
services:
  s-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yt-home
    hostname: "yt-home"
    volumes:
      - "./db:/app/db"
      - "./cert:/app/cert"
    tty: true
    restart: unless-stopped
    ports:
      - "80:80"
      - "2096:2096"
    networks:
      - s-ui
    entrypoint: "./entrypoint.sh"

networks:
  s-ui:
    driver: bridge

