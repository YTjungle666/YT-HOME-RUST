[package]
name = "sqlx"
version = "0.8.6"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Minimal SQLite-only sqlx facade for YT HOME"
repository = "https://github.com/launchbadge/sqlx"

[dependencies]
sqlx-core = { version = "=0.8.6", default-features = false, features = ["offline", "migrate"] }
sqlx-sqlite = { version = "=0.8.6", default-features = false, optional = true }

[features]
default = ["json", "migrate"]
_rt-tokio = []
_sqlite = []
json = ["sqlx-core/json", "sqlx-sqlite?/json"]
migrate = ["sqlx-core/migrate", "sqlx-sqlite?/migrate"]
regexp = ["sqlx-sqlite?/regexp"]
runtime-tokio = ["_rt-tokio", "sqlx-core/_rt-tokio"]
runtime-tokio-rustls = ["runtime-tokio", "tls-rustls-ring"]
sqlite = ["_sqlite", "sqlx-sqlite/bundled"]
sqlite-preupdate-hook = ["sqlx-sqlite/preupdate-hook"]
sqlite-unbundled = ["_sqlite", "sqlx-sqlite/unbundled"]
time = ["sqlx-core/time", "sqlx-sqlite?/time"]
tls-native-tls = ["sqlx-core/_tls-native-tls"]
tls-none = []
tls-rustls = ["tls-rustls-ring"]
tls-rustls-aws-lc-rs = ["sqlx-core/_tls-rustls-aws-lc-rs"]
tls-rustls-ring = ["tls-rustls-ring-webpki"]
tls-rustls-ring-native-roots = ["sqlx-core/_tls-rustls-ring-native-roots"]
tls-rustls-ring-webpki = ["sqlx-core/_tls-rustls-ring-webpki"]
uuid = ["sqlx-core/uuid", "sqlx-sqlite?/uuid"]
