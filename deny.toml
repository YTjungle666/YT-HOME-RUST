[graph]
targets = []

[advisories]
yanked = "deny"
ignore = []

[bans]
multiple-versions = "allow"
wildcards = "allow"
highlight = "all"

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
  "GPL-3.0-only",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Zlib",
]
private = { ignore = true }
